# ── Server ──────────────────────────────────────────────
server.port=8080

# ── MySQL Database ───────────────────────────────────────
# Change username/password to match your local MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────
# update = keeps existing data, only adds new columns/tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── CORS (allow React dev server on port 5173) ───────────
spring.web.cors.allowed-origins=http://localhost:5173

# ── Swagger UI ───────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
